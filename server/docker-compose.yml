services:
  sanction-postgres:
    image: pgvector/pgvector:pg16
    container_name: sanction-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sanction_pgdata:/var/lib/postgresql/data

  sanctions-api:
    build: .
    container_name: sanctions-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - sanction-postgres
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

volumes:
  sanction_pgdata: